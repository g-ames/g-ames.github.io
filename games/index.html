<!DOCTYPE html>
<html>
  <head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5900953824983292" crossorigin="anonymous"></script>
    <title>G-ames | Games</title>
  </head>
  <body>
    <header>
      <h1>G-ames</h1>
      <nav>
        <ul>
          <li><a href="/">Home</a></li>
          <li><a href="/games">Games</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <p>Sorry about the whole 'gameX' thing</p>
      <h2>Games</h2>
      <div id="games"></div>
    </main>
    <footer>
      <p>G-ames</p>
    </footer>
  </body>
  <link href="/styling.css" rel="stylesheet" type="text/css"/>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    const gamesDiv = document.getElementById('games');
    const gameCount = 7638;

    for (let i = 1; i <= gameCount; i++) {
      

    $.ajax({
        type: 'HEAD',
        url: 'https://g-ames.github.io./games/main/game${i}.html',
        success: function() {
          const gameLink = document.createElement('a');
          gameLink.href = `/games/main/game${i}.html`;
          gameLink.textContent = `Game ${i}  `;
          gamesDiv.appendChild(gameLink);
        },
        error: function() {}
    });
    }
  </script>
</html>
