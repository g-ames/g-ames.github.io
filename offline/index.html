<div id="messageBox"></div>
<p>
  In order to use, you must download a file, and use a 'data:' link.
  The 'data:' link is a loader, which allows you to save all of the games.
  The file is a completely unencypted JSON.
</p>
<button onclick="copyLoader();">Copy the loader</button>
<script>
  // create an XMLHttpRequest object
  const xhr = new XMLHttpRequest();

  // specify the URL you want to make a request to
  const url = 'https://g-ames.github.io/loader.txt';

  // open a GET request to the specified URL
  xhr.open('GET', url);

  // set the responseType to text so the response will be treated as plain text
  xhr.responseType = 'text';

  // define a function to handle the response once it's received
  xhr.onload = function() {
    if (xhr.status === 200) {
      const loader = xhr.responseText; // save the loaded text
    } else {
      const loader = null;
      console.error('Request failed. Status code: ' + xhr.status); // log an error message to the console
    }
  };

  // send the request
  xhr.send();
  
  function copyLoader() {
    if(loader === null) {
      const message = document.getElementById('messageBox');
      const messageText = document.createElement('b');
      messageText.value = 'There was an error while loading the loader. Try refreshing the page.';
      message.appendChild(messageText);
    }
    copyText.select();
    copyText.setSelectionRange(0, 99999); // For mobile devices

     // Copy the text inside the text field
    navigator.clipboard.writeText(copyText.value);

    // Alert the copied text
    alert("Copied the text: " + copyText.value);
  }
</script>
